# CoinCall on Render — API + Host web + Admin
# Dashboard → New → Blueprint → connect repo CoinCall → Deploy Blueprint
# Set secret env values when prompted (sync: false).

services:
  # Backend: Agora tokens + call bridge (user ↔ host)
  - type: web
    name: coincall-api
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: ADMIN_API_KEY
        sync: false

  # Host app (Expo web export) — hosts Go Online & accept Luma calls
  - type: web
    name: coincall-host
    runtime: static
    plan: free
    region: oregon
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_APP_ENV
        value: production
      - key: EXPO_PUBLIC_API_BASE_URL
        value: https://coincall-api.onrender.com/api
      - key: EXPO_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_DATABASE_URL
        sync: false
      - key: EXPO_PUBLIC_AGORA_APP_ID
        sync: false
      - key: EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false

  # Admin panel
  - type: web
    name: coincall-admin
    runtime: static
    plan: free
    region: oregon
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://coincall-api.onrender.com/api
      - key: VITE_ADMIN_KEY
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_DATABASE_URL
        sync: false
      - key: VITE_AGORA_APP_ID
        sync: false

  # Fan / user app (Luma) — lists CoinCall hosts & 1v1 calls
  - type: web
    name: luma-user
    runtime: node
    plan: free
    region: oregon
    rootDir: luma-user
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://coincall-api.onrender.com/api
      - key: NEXT_PUBLIC_AGORA_APP_ID
        sync: false

